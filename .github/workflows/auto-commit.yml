name: Auto Commit Every 10 Minutes

 on:
   schedule:
     - cron: '*/10 * * * *'  # Runs every 10 minutes
   workflow_dispatch:

 jobs:
   auto-commit:
     runs-on: ubuntu-latest

     steps:
       - name: Checkout code
         uses: actions/checkout@v4

       - name: Set up Git
         run: |
           git config --global user.name "ynaitedd"
           git config --global user.email "bobies431@gmail.com"

       - name: Make a commit
         run: |
           echo "Commit made at $(date -u)" >> daily_log.txt
           git add daily_log.txt
           if git commit -m "Auto commit at $(date -u)"; then
             echo "Commit successful"
           else
             echo "Nothing to commit or error occurred"
           fi

       - name: Push changes
         uses: ad-m/github-push-action@v0.8.0
         with:
           github_token: ${{ secrets.GITHUB_TOKEN }}
           branch: ${{ github.ref_name }}
